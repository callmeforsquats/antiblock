version: "3.9"

services:

  xray:
    image: teddysun/xray:latest
    container_name: xray-exit
    network_mode: host
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./xray/config.json:/etc/xray/config.json

  wireguard:
    image: alpine:latest
    container_name: wg-exit
    network_mode: host
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    restart: unless-stopped
    volumes:
      - .wireguard/wg0.conf:/etc/wireguard/wg0.conf:ro
    command: >
      sh -c "
        apk add --no-cache wireguard-tools iptables &&
        wg-quick up /etc/wireguard/wg0.conf &&
        tail -f /dev/null"